<h1>Students</h1>
<form method="GET" action="">
    <input type="text" name="name" placeholder="Search by name">
    <input type="text" name="course" placeholder="Search by course">
    <button type="submit">Search</button>
</form>
<ul>
    {% for student in students %}
    <li>
        {{ student.name }} — Courses: 
        {% for course in student.courses.all %}
            {{ course.title }}{% if not forloop.last %}, {% endif %}
        {% endfor %}

        <a href="{% url 'edit_student' student.id %}">Edit</a>
        <a href="{% url 'delete_student student.id%}">Delete</a>
    </li>

{% endfor %}
</ul>
